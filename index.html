<!doctype html>
<html>
  <head> </head>

  <body>
    <script>
      BX24.init(function () {
        const dealId = BX24.placement.info().options.ID;

        const WEBHOOK =
          "https://regaliscapitalcorp.bitrix24.com/rest/1/8y16me8u216uyzve/";

        fetch(WEBHOOK + "crm.deal.get.json?ID=" + dealId)
          .then((r) => r.json())
          .then((data) => {
            const deal = data.result;

            const prev = localStorage.getItem("stage_" + dealId);

            if (prev === "LOSE" && deal.STAGE_ID !== "WON") {
              BX.UI.Dialogs.MessageBox.show({
                title: "Warning",
                message: "Deal was previously LOST and has been reopened.",
                buttons: BX.UI.Dialogs.MessageBoxButtons.OK,
              });
            }

            localStorage.setItem("stage_" + dealId, deal.STAGE_ID);
          });
      });
    </script>
  </body>
</html>
