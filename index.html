<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Deal Stage Validator</title>

  <!-- Bitrix CRM JS API -->
  <script src="https://api.bitrix24.com/api/v1/"></script>
</head>

<body>

<h3>Deal Stage Validator Running...</h3>

<script>
console.log("WIDGET LOADED");

// Safety check
if (!window.BX24) {
  alert("BX24 NOT FOUND - NOT INSIDE BITRIX CRM");
} else {

  BX24.init(() => {

    console.log("BX24 READY");

    try {

      const dealId = BX24.placement.info().options.ID;
      console.log("Deal ID:", dealId);

      const WEBHOOK = "https://regaliscapitalcorp.bitrix24.com/rest/1/rbctxohhfzho0lfp/";

      fetch(WEBHOOK + "crm.deal.get.json?ID=" + dealId)
        .then(res => res.json())
        .then(data => {

          const deal = data.result;
          const currentStage = deal.STAGE_ID;

          console.log("Current stage:", currentStage);

          const key = "stage_" + dealId;
          const prevStage = localStorage.getItem(key);

          console.log("Previous stage:", prevStage);

          // 🔴 INIT STORAGE IF FIRST RUN
          if (!prevStage) {
            localStorage.setItem(key, currentStage);
            console.log("Stage initialized:", currentStage);
            return;
          }

          // 🔥 MAIN LOGIC: LOSE → reopened (not WON)
          if (prevStage === "LOSE" && currentStage !== "WON") {

            BX.UI.Dialogs.MessageBox.show({
              title: "⚠ Deal Reopened Alert",
              message: "This deal was previously marked as LOST and has been reopened.",
              modal: true,
              buttons: BX.UI.Dialogs.MessageBoxButtons.OK
            });

          }

          // update stored stage
          localStorage.setItem(key, currentStage);

        })
        .catch(err => {
          console.error("Webhook error:", err);

          BX.UI.Dialogs.MessageBox.show({
            title: "Error",
            message: "Failed to fetch deal data.",
            buttons: BX.UI.Dialogs.MessageBoxButtons.OK
          });

        });

    } catch (e) {
      console.error("Fatal error:", e);

      BX.UI.Dialogs.MessageBox.show({
        title: "Critical Error",
        message: e.message,
        buttons: BX.UI.Dialogs.MessageBoxButtons.OK
      });
    }

  });

}
</script>

</body>
</html>
